services:
  backenddb:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${AQUALOG_DB_NAME:-aqualog}"
      POSTGRES_USER: "${AQUALOG_DB_USER:-aqualog}"
      POSTGRES_PASSWORD: "${AQUALOG_DB_PASSWORD}"
    ports:
      - "${AQUALOG_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AQUALOG_DB_USER:-aqualog} -d ${AQUALOG_DB_NAME:-aqualog}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - aqualog-postgres-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: "aqualog@example.com"
      PGADMIN_DEFAULT_PASSWORD: "aqualog"
      PGADMIN_DISABLE_POSTFIX: "1"
    volumes:
      - ./.data/pgadmin4:/var/lib/pgadmin
      - ./.data/pgservers.json:/pgadmin4/servers.json
    ports:
      - 9090:80

