version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install:
    desc: Install project dependencies
    cmds:
      - uv pip install -r requirements.txt

  server:
    desc: Start the API server locally
    env:
      AQUALOG_APP_ENV: dev
    cmds:
      - .venv/bin/python main.py

  test:
    desc: Run the test suite
    env:
      AQUALOG_APP_ENV: test
    cmds:
      - .venv/bin/pytest -q
